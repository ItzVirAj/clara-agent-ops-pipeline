version: "3.8"

services:
  clara-pipeline:
    image: python:3.10-slim
    container_name: clara_pipeline
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_REPO=${GH_REPO}
      - ACCT_OUT_DIR=outputs/accounts
      - LOG_DIR=logs
      - DATA_DEMO_DIR=data/demo
      - DATA_ONBOARD_DIR=data/onboard
    command: >
      sh -c "pip install -r requirements.txt &&
             python scripts/run_batch.py"

  clara-dashboard:
    image: python:3.10-slim
    container_name: clara_dashboard
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_REPO=${GH_REPO}
      - ACCT_OUT_DIR=outputs/accounts
      - LOG_DIR=logs
      - DATA_DEMO_DIR=data/demo
      - DATA_ONBOARD_DIR=data/onboard
    command: >
      sh -c "pip install -r requirements.txt &&
             python pipe/server.py"